<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard de Estudos - Matérias</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Painel de Estudos</h1>
      <nav>
        <a href="index.html" class="hover-blue">Dashboard</a>
        <a href="materias.html" id="header-ativo">Matérias</a>
        <a href="" class="hover-blue">Sair</a>
        <i class="fa-solid fa-bars none"></i>
      </nav>
    </header>
    <main>
      <!--Seção das lições-->
      <div class="licoes-container-materias">
        <section class="licoes-container pagina-materias">
          <div class="opc-licoes-materia">
            <h1 class="titulo-licoes">Matérias</h1>
            <button class="btn-adicionar-materia">Nova Matéria</button>
          </div>
          <div class="licoes-grid-materia">
            <div class="licao-container">
              <h1 class="nome-materia pagina">Matéria</h1>
              <div class="licao-info">
                <h2 class="entrega">Atividades Concluidas : 0</h2>
                <h2 class="status-licao">Atividades Pendentes : 0</h2>
              </div>
              <div class="porcentagem-licao"></div>
              <nav class="edicao-licao btn-edicao-materia">
                <button class="btn-edicao-licao hover-blue">Exluir</button>
              </nav>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
