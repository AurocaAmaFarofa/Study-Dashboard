<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard de Estudos - Inicio</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Painel de Estudos</h1>
      <nav>
        <a href="index.html" class="hover-blue">Dashboard</a>
        <a href="materias.html" class="hover-blue">Matérias</a>
        <a href="" class="hover-blue">Sair</a>
        <i class="fa-solid fa-bars none"></i>
      </nav>
    </header>
    <main>
      <h1 class="titulo">Adicionar Lição</h1>
      <section class="add-licao-container">
        <label for="materia"><h3>Materia</h3></label>
        <input
          list="lista-materias"
          id="materia"
          name="materia"
          placeholder="Selecione a Materia..."
          class="input-materia"
        />
        <datalist id="lista-materias"></datalist>

        <label for="data-entrega"><h3>Data de Entrega</h3></label>
        <input type="date" id="data-entrega" name="data-de-entrega" />

        <label for="prioridade"><h3>Prioridade</h3></label>
        <input
          class="input-materia"
          list="lista-prioridades"
          id="prioridade"
          name="prioridade"
          placeholder="Selecione o Grau de Prioridade..."
        />
        <datalist id="lista-prioridades">
          <option value="Baixa"></option>
          <option value="Media"></option>
          <option value="Alta"></option>
        </datalist>

        <label for="status"><h3>Status</h3></label>
        <input
          list="status-licao"
          id="status"
          name="status"
          placeholder="Status da Lição..."
          class="input-materia"
        />
        <datalist id="status-licao">
          <option value="Não iniciada"></option>
          <option value="Em andamento"></option>
        </datalist>

        <h3>Descrição</h3>
        <input
          id="descricao"
          type="text"
          placeholder="Descrição da Lição..."
          class="input-materia"
        />

        <button id="btn-adicionar-licao" class="btn-adicionar-materia">
          <h5>Adicionar</h5>
        </button>
      </section>
    </main>
  </body>
</html>
