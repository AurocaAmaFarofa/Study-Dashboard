<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard de Estudos - Inicio</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Painel de Estudos</h1>
      <nav>
        <a href="index.html" id="header-ativo">Dashboard</a>
        <a href="materias.html" class="hover-blue">Matérias</a>
        <a href="" class="hover-blue">Sair</a>
        <i class="fa-solid fa-bars none"></i>
      </nav>
    </header>
    <main>
      <h1 class="titulo">Bem vindo, Usuario!</h1>
      <div class="grid-1">
        <div class="grid-1-cards" id="grid-1-materias">
          <h1 class="titulo-card-1">Matérias</h1>
          <p class="numero-card-1"><strong>0</strong></p>
        </div>
        <div class="grid-1-cards" id="grid-1-concluidas">
          <h1 class="titulo-card-1">Lições Feitas</h1>
          <p class="numero-card-1"><strong>0</strong></p>
        </div>
        <div class="grid-1-cards" id="grid-1-pendente">
          <h1 class="titulo-card-1">Lições Pendentes</h1>
          <p class="numero-card-1"><strong>1</strong></p>
        </div>
      </div>
      <!--Seção das lições-->
      <section class="licoes-container">
        <div class="opc-licoes-materia">
          <h1 class="titulo-licoes">Lições</h1>
          <a href="licao.html">Add lição</a>
          <button class="btn-adicionar-materia" id="adicionar-licao">
            Nova Lição
          </button>
        </div>
        <div class="licoes-grid"></div>
      </section>
    </main>
  </body>
</html>
